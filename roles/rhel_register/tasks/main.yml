---
- name: Check current subscription status
  ansible.builtin.command:
    cmd: subscription-manager status
  register: rhsm_status
  changed_when: false
  failed_when: false

- name: Test subscription validity with refresh
  ansible.builtin.command:
    cmd: subscription-manager refresh
  register: _refresh_test
  changed_when: false
  failed_when: false
  when: rhsm_status.rc == 0

- name: Determine if registration is needed
  ansible.builtin.set_fact:
    _needs_registration: >-
      {{ rhsm_status.rc != 0 or
         (_refresh_test.rc | default(0)) != 0 }}

- name: Force clean stale registration
  ansible.builtin.command:
    cmd: subscription-manager clean
  when: _needs_registration | bool and rhsm_status.rc == 0
  changed_when: true

- name: Read RHEL subscription credentials from Vault
  community.hashi_vault.vault_kv2_get:
    url: "{{ vault_addr }}"
    auth_method: approle
    role_id: "{{ role_id }}"
    secret_id: "{{ secret_id }}"
    engine_mount_point: "{{ vault_kv_mount }}"
    path: "{{ vault_rhel_secret_path }}"
    validate_certs: false
  register: rhel_creds
  delegate_to: localhost
  become: false
  no_log: true
  when: _needs_registration | bool

- name: Register with RHSM
  community.general.redhat_subscription:
    state: present
    username: "{{ rhel_creds.secret.rhn_username }}"
    password: "{{ rhel_creds.secret.rhn_password }}"
    auto_attach: "{{ rhsm_auto_attach }}"
    force_register: "{{ rhsm_status.rc == 0 }}"
  when: _needs_registration | bool
  no_log: true

- name: Check for Simple Content Access mode
  ansible.builtin.command:
    cmd: subscription-manager status
  register: _sca_check
  changed_when: false
  failed_when: false

- name: Refresh subscription data for SCA
  ansible.builtin.command:
    cmd: subscription-manager refresh
  when: "'Simple Content Access' in _sca_check.stdout"
  changed_when: false

- name: Clean dnf metadata after refresh
  ansible.builtin.command:
    cmd: dnf clean all
  when: "'Simple Content Access' in _sca_check.stdout"
  changed_when: false

- name: Enable required repositories
  community.general.rhsm_repository:
    name: "{{ rhsm_repos_enable }}"
    state: enabled
  when:
    - rhsm_repos_enable | length > 0
    - "'Simple Content Access' not in _sca_check.stdout"

- name: Verify repository access
  ansible.builtin.command:
    cmd: dnf repolist
  register: repo_list
  changed_when: false

- name: Display available repositories
  ansible.builtin.debug:
    msg: "{{ repo_list.stdout_lines }}"
