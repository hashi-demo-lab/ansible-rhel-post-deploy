---
- name: Check current subscription status
  ansible.builtin.command:
    cmd: subscription-manager status
  register: rhsm_status
  changed_when: false
  failed_when: false

- name: Read RHEL subscription credentials from Vault
  community.hashi_vault.vault_kv2_get:
    url: "{{ vault_addr }}"
    auth_method: approle
    role_id: "{{ role_id }}"
    secret_id: "{{ secret_id }}"
    engine_mount_point: "{{ vault_kv_mount }}"
    path: "{{ vault_rhel_secret_path }}"
    validate_certs: false
  register: rhel_creds
  delegate_to: localhost
  become: false
  no_log: true
  when: rhsm_status.rc != 0

- name: Register with RHSM
  community.general.redhat_subscription:
    state: present
    username: "{{ rhel_creds.secret.rhn_username }}"
    password: "{{ rhel_creds.secret.rhn_password }}"
    auto_attach: "{{ rhsm_auto_attach }}"
  when: rhsm_status.rc != 0
  no_log: true

- name: Check for Simple Content Access mode
  ansible.builtin.command:
    cmd: subscription-manager status
  register: _sca_check
  changed_when: false
  failed_when: false

- name: Refresh subscription data for SCA
  ansible.builtin.command:
    cmd: subscription-manager refresh
  when: "'Simple Content Access' in _sca_check.stdout"
  changed_when: false

- name: Clean dnf metadata after refresh
  ansible.builtin.command:
    cmd: dnf clean all
  when: "'Simple Content Access' in _sca_check.stdout"
  changed_when: false

- name: Enable required repositories
  community.general.rhsm_repository:
    name: "{{ rhsm_repos_enable }}"
    state: enabled
  when:
    - rhsm_repos_enable | length > 0
    - "'Simple Content Access' not in _sca_check.stdout"

- name: Verify repository access
  ansible.builtin.command:
    cmd: dnf repolist
  register: repo_list
  changed_when: false

- name: Display available repositories
  ansible.builtin.debug:
    msg: "{{ repo_list.stdout_lines }}"
