---
# Vault connection for reading RHEL subscription credentials
vault_addr: "https://vault.hashicorp.local:8200"
vault_auth_method: approle
vault_kv_mount: secrets
vault_rhel_secret_path: rhel/subscription

# RHSM registration settings
rhsm_auto_attach: true

# Repositories to enable after registration
rhsm_repos_enable:
  - rhel-9-for-x86_64-baseos-rpms
  - rhel-9-for-x86_64-appstream-rpms
